<div class="mb-4">
  <h3 class="fw-bold mb-1">My Profile</h3>
  <p class="text-muted mb-0">View your coordinator account details.</p>
</div>

<div class="row g-4">
  <div class="col-lg-6 mx-auto">
    <div class="card border-0 shadow-sm text-center p-4">
      <div class="mx-auto bg-cyan-light text-cyan rounded-circle d-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px; font-size: 2rem; font-weight: bold;">
        {{ initials }}
      </div>
      <h5 class="fw-bold mb-1">{{ userName }}</h5>
      <p class="text-muted small mb-3">{{ userEmail }}</p>
      <hr>
      <div class="text-start">
        <div class="mb-2">
          <small class="text-muted d-block">System Role</small>
          <span class="fw-medium text-capitalize">{{ userRole.toLowerCase().replace('_', ' ') }}</span>
        </div>
        <div class="mb-2">
          <small class="text-muted d-block">Status</small>
          <span class="badge bg-success">ACTIVE</span>
        </div>
      </div>
    </div>
  </div>
</div>
