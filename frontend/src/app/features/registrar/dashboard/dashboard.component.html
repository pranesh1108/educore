<div class="mb-4">
  <h3 class="fw-bold mb-1">Registrar Dashboard</h3>
  <p class="text-muted mb-0">Welcome back Registrar.</p>
</div>

<app-loader *ngIf="loading" message="Loading your dashboard..."></app-loader>

<div class="alert alert-danger" role="alert" *ngIf="!loading && errorMessage">
  {{ errorMessage }}
</div>

<div class="row g-3" *ngIf="!loading">
  <div class="col-md-6">
    <a routerLink="/registrar/courses" class="text-decoration-none">
      <div class="card border-0 shadow-sm h-100 quick-link py-2">
        <div class="card-body">
          <h5 class="fw-bold mb-2 text-primary">
            <i class="bi bi-journal-bookmark me-2"></i>Manage Courses
          </h5>
          <p class="text-muted small mb-0">Provision new courses and browse the full catalogue layout updates.</p>
        </div>
      </div>
    </a>
  </div>

  <div class="col-md-6">
    <a routerLink="/registrar/users" class="text-decoration-none">
      <div class="card border-0 shadow-sm h-100 quick-link py-2">
        <div class="card-body">
          <h5 class="fw-bold mb-2 text-primary">
            <i class="bi bi-people me-2"></i>Students & Instructors
          </h5>
          <p class="text-muted small mb-0">Search student and instructor database records.</p>
        </div>
      </div>
    </a>
  </div>
</div>
