<div class="position-relative notification-hub-wrapper">

  <!-- Bell Trigger Button -->
  <button 
    class="btn btn-link nav-link position-relative border-0 shadow-none p-2" 
    (click)="toggleDropdown()"
    title="Notifications"
  >
    <i class="bi bi-bell text-dark fs-4"></i>
    <span 
      *ngIf="unreadCount > 0" 
      class="position-absolute top-1 start-75 translate-middle badge rounded-pill bg-danger font-monospace text-center small" 
      style="font-size: 0.65rem;"
    >
      {{ unreadCount }}
    </span>
  </button>

  <!-- Notification Dropdown Popover -->
  <div 
    *ngIf="isOpen" 
    class="card shadow-lg border-0 dropdown-menu-end d-block position-absolute mt-2 p-0 rounded-3 overflow-hidden animate-pop-in" 
    style="width: 360px; right: 0; z-index: 1050; font-size: 0.85rem;"
  >
    <!-- Header -->
    <div class="card-header bg-purple text-white d-flex justify-content-between align-items-center py-2.5 px-3 border-0">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-bell-fill fs-6 text-white"></i>
        <span class="fw-bold text-white mb-0">Notifications</span>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span class="badge bg-white text-purple fw-bold rounded-pill" style="font-size: 0.72rem;">
          {{ unreadCount }} New
        </span>
        <button 
          *ngIf="unreadCount > 0"
          class="btn btn-sm text-white p-0 text-decoration-none border-0 hover-light small fw-semibold ms-1" 
          style="font-size: 0.72rem; opacity: 0.9;"
          (click)="markAllAsRead()"
        >
          <i class="bi bi-check2-all me-0.5"></i> Mark all as read
        </button>
      </div>
    </div>

    <!-- Notification List Body -->
    <div class="list-group list-group-flush overflow-auto custom-scrollbar" style="max-height: 350px;">
      
      <div 
        *ngFor="let alert of notifications"
        (click)="markAsRead(alert)"
        [class.unread-item]="isItemUnread(alert)"
        [class.read-item]="!isItemUnread(alert)"
        class="list-group-item list-group-item-action py-3 px-3 transition-all cursor-pointer border-bottom position-relative"
      >
        <div class="d-flex align-items-start gap-2.5">
          
          <!-- Category Icon Badge -->
          <div 
            class="notification-icon rounded-circle flex-shrink-0 d-flex align-items-center justify-content-center mt-0.5"
            [ngClass]="getNotificationIconClass(alert)"
            style="width: 34px; height: 34px;"
          >
            <i class="bi" [ngClass]="getNotificationIcon(alert)"></i>
          </div>

          <!-- Notification Details -->
          <div class="flex-grow-1 min-w-0">
            <div class="d-flex justify-content-between align-items-baseline mb-1">
              <h6 
                class="mb-0 text-truncate fw-bold" 
                [class.text-dark]="isItemUnread(alert)" 
                [class.text-muted]="!isItemUnread(alert)"
                style="max-width: 180px; font-size: 0.82rem;"
              >
                {{ alert.title || 'System Alert' }}
              </h6>
              <small class="text-muted font-monospace" style="font-size: 0.68rem;">
                {{ alert.createdAt | date:'shortTime' }}
              </small>
            </div>

            <p class="small mb-1 lh-sm text-wrap" [class.text-secondary]="isItemUnread(alert)" [class.text-muted]="!isItemUnread(alert)" style="font-size: 0.78rem;">
              {{ alert.message }}
            </p>

            <div class="d-flex justify-content-between align-items-center mt-1">
              <span class="badge rounded-pill bg-light text-muted border px-2" style="font-size: 0.65rem;">
                {{ getCategoryLabel(alert) }}
              </span>
              
              <!-- Unread Indicator Tag -->
              <span *ngIf="isItemUnread(alert)" class="badge bg-purple-subtle text-purple fw-bold px-2 py-0.5 rounded-pill" style="font-size: 0.65rem;">
                ● Unread
              </span>
            </div>
          </div>

        </div>
      </div>

      <!-- Empty State -->
      <div *ngIf="notifications.length === 0" class="text-center py-5 px-3">
        <div class="icon-circle bg-light-purple text-purple mx-auto mb-2 rounded-circle d-flex align-items-center justify-content-center" style="width: 44px; height: 44px;">
          <i class="bi bi-bell-slash fs-5"></i>
        </div>
        <p class="text-muted small mb-0 fw-medium">No operational alerts logged yet.</p>
      </div>

    </div>

    <!-- Footer -->
    <div class="card-footer bg-light border-top py-2 px-3 text-center" *ngIf="notifications.length > 0">
      <small class="text-muted" style="font-size: 0.72rem;">Click an alert to mark it as read</small>
    </div>

  </div>
</div>
