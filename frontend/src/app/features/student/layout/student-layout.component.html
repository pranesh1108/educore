<app-navbar></app-navbar>

<div class="student-shell d-flex">
  <aside class="student-sidebar bg-white border-end d-none d-md-flex flex-column p-3">
    <p class="text-uppercase text-muted small fw-bold mb-3 px-2">Student Portal</p>
    <nav class="nav flex-column gap-1">
      <a
        *ngFor="let link of navLinks"
        [routerLink]="link.path"
        routerLinkActive="active"
        class="nav-link student-nav-link rounded px-3 py-2"
      >
        <i class="bi" [ngClass]="link.icon"></i>
        <span class="ms-2">{{ link.label }}</span>
      </a>
    </nav>
  </aside>

  <main class="student-content flex-grow-1 p-3 p-md-4">
    <router-outlet></router-outlet>
  </main>
</div>
