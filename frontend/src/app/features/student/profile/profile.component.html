<div class="mb-4">
  <h3 class="fw-bold mb-1">My Profile</h3>
  <p class="text-muted mb-0">View and update your student account properties.</p>
</div>

<div class="row g-4">
  <div class="col-lg-4">
    <div class="card border-0 shadow-sm text-center p-4 h-100">
      <div class="mx-auto bg-light text-primary rounded-circle d-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px; font-size: 2rem; font-weight: bold; background-color: #f3e8ff !important; color: #6b21a8 !important;">
        S
      </div>
      <h5 class="fw-bold mb-1">student</h5>
      <p class="text-muted small mb-0">student1@gmail.com</p>
      
      </div>
  </div>

  <div class="col-lg-8">
    <div class="card border-0 shadow-sm p-4 h-100">
      <h5 class="fw-bold mb-3">Edit Profile Settings</h5>
      
      <form (ngSubmit)="saveProfile()">
        <div class="mb-3">
          <label for="dob" class="form-label small fw-bold">Date of Birth</label>
          <input
            type="date"
            class="form-control"
            id="dob"
            name="dateOfBirth"
            [(ngModel)]="dateOfBirth"
            required
          >
        </div>

        <div class="mb-3">
          <label for="interest" class="form-label small fw-bold">Field of Interest</label>
          <input
            type="text"
            class="form-control"
            id="interest"
            name="fieldOfInterest"
            placeholder="e.g. Artificial Intelligence, Web Development"
            [(ngModel)]="fieldOfInterest"
            required
          >
        </div>

        <div class="d-flex justify-content-end mt-4">
          <button type="submit" class="btn btn-primary px-4 purple-btn" style="background-color: #7c3aed; border-color: #7c3aed;">
            Save Changes
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
