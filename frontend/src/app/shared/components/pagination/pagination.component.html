<nav aria-label="Pagination" *ngIf="totalPages > 1">
  <ul class="pagination pagination-sm justify-content-center align-items-center mb-0 gap-1">
    
    <!-- First Page Button (<<) -->
    <li class="page-item" [class.disabled]="currentPage === 1">
      <button class="page-link px-2" (click)="goTo(1)" title="First Page">
        <i class="bi bi-chevron-double-left"></i>
      </button>
    </li>

    <!-- Previous Page Button (< Prev) -->
    <li class="page-item" [class.disabled]="currentPage === 1">
      <button class="page-link px-3 d-flex align-items-center gap-1" (click)="goTo(currentPage - 1)">
        <i class="bi bi-chevron-left"></i> Prev
      </button>
    </li>

    <!-- Dynamic Windowed Page Number Buttons -->
    <li class="page-item" *ngFor="let page of pages" [class.active]="page === currentPage">
      <button class="page-link fw-bold px-3" (click)="goTo(page)">{{ page }}</button>
    </li>

    <!-- Next Page Button (Next >) -->
    <li class="page-item" [class.disabled]="currentPage === totalPages">
      <button class="page-link px-3 d-flex align-items-center gap-1" (click)="goTo(currentPage + 1)">
        Next <i class="bi bi-chevron-right"></i>
      </button>
    </li>

    <!-- Last Page Button (>>) -->
    <li class="page-item" [class.disabled]="currentPage === totalPages">
      <button class="page-link px-2" (click)="goTo(totalPages)" title="Last Page">
        <i class="bi bi-chevron-double-right"></i>
      </button>
    </li>

  </ul>
</nav>
